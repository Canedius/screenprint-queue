// ── DROPSHIP REPORT ───────────────────────────────────────────────────────────
function Dropship() {
  const daysAgo = (n) => {
    const d = new Date(); d.setDate(d.getDate()-n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const [dateFrom, setDateFrom] = useState(daysAgo(7));
  const [dateTo, setDateTo]     = useState(todayStr());
  const [tagFilter, setTagFilter] = useState('ДРОП');
  const [orders, setOrders]     = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState(null);
  const [loaded, setLoaded]     = useState(false);
  const [expanded, setExpanded] = useState({});

  const load = async () => {
    if (!dateFrom || !dateTo) { setError('Вкажіть діапазон дат'); return; }
    if (dateFrom > dateTo)    { setError('Дата «від» пізніше за «до»'); return; }
    setLoading(true); setError(null);
    try {
      const res = await api.listByDate(dateFrom, dateTo);
      const list = Array.isArray(res?.orders) ? res.orders
                 : Array.isArray(res)         ? res
                 : Array.isArray(res?.data)   ? res.data
                 : [];
      setOrders(list);
      setLoaded(true);
    } catch (e) {
      setError(`Не вдалося завантажити: ${e.message || e}`);
      setOrders([]);
    } finally { setLoading(false); }
  };

  const productCount = (o) => (o.products || []).reduce((s, p) => s + (Number(p.qty) || 0), 0);

  const printsPerItem = (o) => {
    const raw = o.tags;
    const tags = Array.isArray(raw) ? raw.join(' ') : (raw || '');
    const hay = `${tags} ${o.companyName || ''}`;
    return /modern\s+armor/i.test(hay) ? 2 : 1;
  };
  const printCount = (o) => productCount(o) * printsPerItem(o);

  const EXCLUDED_STATUS_IDS = new Set([7, 8, 11, 12, 19, 23, 24, 26, 40, 46, 53]);

  const filtered = useMemo(() => {
    const needle = tagFilter.trim().toLowerCase();
    return orders.filter(o => {
      const sid = Number(o.status_id ?? o.statusId);
      if (Number.isFinite(sid) && EXCLUDED_STATUS_IDS.has(sid)) return false;
      if (!needle) return true;
      const raw = o.tags;
      const tags = Array.isArray(raw) ? raw.join(' ') : (raw || '');
      return tags.toLowerCase().split(/[,;\s]+/).filter(Boolean).some(t => t === needle);
    });
  }, [orders, tagFilter]);

  const totals = useMemo(() => ({
    orderCount: filtered.length,
    productCount: filtered.reduce((s,o) => s + productCount(o), 0),
    printCount: filtered.reduce((s,o) => s + printCount(o), 0),
    companyCount: new Set(filtered.map(o => o.companyId ?? 'none')).size,
  }), [filtered]);

  const byDay = useMemo(() => {
    const map = new Map();
    for (const o of filtered) {
      const src = o.shippedAt || o.createdAt;
      const dayKey = src ? String(src).slice(0, 10) : 'none';
      if (!map.has(dayKey)) map.set(dayKey, { key: dayKey, orders: [], totalQty: 0, totalPrints: 0, companies: new Map() });
      const g = map.get(dayKey);
      g.orders.push(o);
      g.totalQty += productCount(o);
      g.totalPrints += printCount(o);
      const cKey = o.companyId ?? 'none';
      const cName = o.companyName || (cKey === 'none' ? 'Без компанії' : `Компанія #${cKey}`);
      if (!g.companies.has(cKey)) g.companies.set(cKey, { key: cKey, name: cName, orders: [], totalQty: 0, totalPrints: 0 });
      const cg = g.companies.get(cKey);
      cg.orders.push(o);
      cg.totalQty += productCount(o);
      cg.totalPrints += printCount(o);
    }
    const list = Array.from(map.values()).sort((a,b) => (a.key < b.key ? 1 : -1));
    for (const g of list) {
      g.companies = Array.from(g.companies.values()).sort((a,b) => b.totalQty - a.totalQty);
    }
    return list;
  }, [filtered]);

  const fmtDate = (s) => {
    if (!s) return '—';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
  };

  return (
    <div className="space-y-4">
      <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
        <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 mb-3">📦 Дропшипінг — звіт за період</h2>
        <div className="grid grid-cols-1 sm:grid-cols-4 gap-3">
          <div>
            <label className="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Дата від</label>
            <input className="inp" type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} max={dateTo}/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Дата до</label>
            <input className="inp" type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} min={dateFrom}/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Тег для фільтру</label>
            <input className="inp" type="text" value={tagFilter} onChange={e=>setTagFilter(e.target.value)} placeholder="ДРОП"/>
          </div>
          <div className="flex items-end">
            <button onClick={load} disabled={loading}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
              {loading ? 'Завантаження…' : '⬇ Завантажити'}
            </button>
          </div>
        </div>
        {error && (
          <div className="mt-3 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm">
            ⚠️ {error}
          </div>
        )}
      </div>

      {loaded && !loading && (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <StatCard label="Замовлень" value={totals.orderCount} accent="blue"/>
          <StatCard label="Кількість продукції" value={totals.productCount} accent="green"/>
          <StatCard label="Набиттів" value={totals.printCount} accent="purple"/>
          <StatCard label="Компаній" value={totals.companyCount} accent="purple"/>
        </div>
      )}

      {loaded && !loading && byDay.length === 0 && (
        <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-8 text-center text-gray-500 dark:text-gray-400">
          За вибраний період замовлень із тегом «{tagFilter}» не знайдено.
        </div>
      )}

      {byDay.map(g => (
        <div key={g.key} className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
          <button onClick={()=>setExpanded(p=>({...p,[g.key]:!p[g.key]}))}
            className="w-full p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors text-left">
            <div className="flex items-center gap-3 min-w-0">
              <span className="text-xl">{expanded[g.key] ? '▾' : '▸'}</span>
              <span className="font-semibold text-gray-800 dark:text-gray-100 truncate">{g.key === 'none' ? 'Без дати' : fmtDate(g.key)}</span>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <span className="px-2 py-1 rounded-md bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 text-xs font-medium">
                {g.orders.length} зам.
              </span>
              <span className="px-2 py-1 rounded-md bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 text-xs font-medium">
                {g.totalQty} шт.
              </span>
              <span className="px-2 py-1 rounded-md bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 text-xs font-medium">
                {g.totalPrints} наб.
              </span>
            </div>
          </button>
          {expanded[g.key] && (
            <div className="border-t border-gray-200 dark:border-gray-700 divide-y divide-gray-100 dark:divide-gray-700">
              {g.companies.map(c => {
                const ck = `${g.key}::${c.key}`;
                return (
                  <div key={ck}>
                    <button onClick={()=>setExpanded(p=>({...p,[ck]:!p[ck]}))}
                      className="w-full px-4 py-2 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors text-left">
                      <div className="flex items-center gap-2 min-w-0">
                        <span className="text-sm">{expanded[ck] ? '▾' : '▸'}</span>
                        <span className="text-sm font-medium text-gray-700 dark:text-gray-200 truncate">{c.name}</span>
                      </div>
                      <div className="flex items-center gap-2 shrink-0">
                        <span className="px-2 py-0.5 rounded bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 text-xs">{c.orders.length} зам.</span>
                        <span className="px-2 py-0.5 rounded bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 text-xs">{c.totalQty} шт.</span>
                        <span className="px-2 py-0.5 rounded bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 text-xs">{c.totalPrints} наб.</span>
                      </div>
                    </button>
                    {expanded[ck] && (
                      <div className="bg-gray-50 dark:bg-gray-900/30 divide-y divide-gray-100 dark:divide-gray-700">
                        {c.orders.map((o, i) => (
                          <div key={o.id || i} className="px-6 py-2 flex flex-wrap items-center gap-3 text-sm">
                            <a href={`https://pngstudio.keycrm.app/app/orders/view/${o.id}`} target="_blank" rel="noopener noreferrer"
                               className="font-mono text-blue-600 dark:text-blue-400 hover:underline shrink-0">#{o.id}</a>
                            <span className="text-gray-700 dark:text-gray-200 truncate flex-1 min-w-[120px]">{o.client || '—'}</span>
                            {o.statusLabel && (
                              <span className="px-2 py-0.5 rounded text-xs font-medium shrink-0"
                                    style={o.statusColor ? {backgroundColor: o.statusColor + '22', color: o.statusColor, border: `1px solid ${o.statusColor}55`} : undefined}>
                                {o.statusLabel}
                              </span>
                            )}
                            <span className="font-semibold text-gray-800 dark:text-gray-100 shrink-0">{productCount(o)} шт.</span>
                            <span className="text-xs px-2 py-0.5 rounded bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300 shrink-0">{printCount(o)} наб.{printsPerItem(o) > 1 ? ` ×${printsPerItem(o)}` : ''}</span>
                            {o.tags && (
                              <span className="text-xs text-gray-500 dark:text-gray-400 truncate max-w-[200px]">🏷 {Array.isArray(o.tags) ? o.tags.join(', ') : o.tags}</span>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function StatCard({label, value, accent}) {
  const colors = {
    blue:   'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border-blue-200 dark:border-blue-800',
    green:  'bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 border-green-200 dark:border-green-800',
    purple: 'bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 border-purple-200 dark:border-purple-800',
  };
  return (
    <div className={`rounded-2xl border p-4 ${colors[accent] || colors.blue}`}>
      <div className="text-xs font-medium opacity-80 mb-1">{label}</div>
      <div className="text-3xl font-bold">{value}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
