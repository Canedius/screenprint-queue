<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Виробнича черга — Шовкотрафарет</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="config.js"></script>
  <style>
    .inp {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: white;
      font-size: 0.875rem;
      transition: border-color 0.15s;
      color: #111827;
    }
    .inp:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    .dark .inp { background: #374151; border-color: #4b5563; color: #f3f4f6; }
    .dark .inp:focus { border-color: #60a5fa; }
    textarea.inp { resize: vertical; }
  </style>
</head>
<body class="antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useContext, createContext, useCallback, useMemo, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const CAP = 500;
const HOURS_PER_DAY = 8;

const PRINT_SIZES = {
  a5:    { label: '≤ A5',  cap: 1000, note: 'до 148×210 мм' },
  a4:    { label: 'A4',    cap: 500,  note: '210×297 мм' },
  a3:    { label: 'A3',    cap: 500,  note: '297×420 мм' },
  large: { label: '> A3', cap: 200,  note: 'більше A3' },
};

// ── API ───────────────────────────────────────────────────────────────────────
const BASE = () => (typeof N8N_BASE !== 'undefined' ? N8N_BASE : '');
const call = (op, data) => fetch(`${BASE()}/screenprint`, {
  method: 'POST',
  headers: {'Content-Type':'application/json'},
  body: JSON.stringify({op, data})
}).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

function parseOrder(o) {
  if (!o || typeof o !== 'object') return null;

  let positions = o.positions;
  if (typeof positions === 'string') {
    try { positions = JSON.parse(positions); } catch { positions = []; }
  }
  if (!Array.isArray(positions) || positions.length === 0) positions = null;

  let crm = {};
  if (typeof o.crmData === 'string' && o.crmData) {
    try {
      const p = JSON.parse(o.crmData);
      if (p && typeof p === 'object' && !Array.isArray(p)) crm = p;
    } catch { crm = {}; }
  }

  return {
    ...o,
    positions: positions || undefined,
    crmProducts:    (()=>{ let p=o.crmProducts; if(typeof p==='string'){try{p=JSON.parse(p);}catch{p=null;}} return Array.isArray(p)?p:(Array.isArray(crm.products)?crm.products:[]); })(),
    crmManager:     crm.manager      || o.crmManager      || '',
    crmPhone:       crm.phone        || o.crmPhone        || '',
    crmDelivery:    crm.delivery     || o.crmDelivery     || '',
    crmStatusLabel: crm.statusLabel  || o.crmStatusLabel  || '',
    crmTrackingCode:crm.trackingCode || o.crmTrackingCode || '',
    crmReceiveAt:   crm.receiveAt    || o.crmReceiveAt    || '',
    crmTags:        crm.tags         || o.crmTags         || '',
    crmTotalPaid:   crm.totalPaid    || o.crmTotalPaid    || 0,
    crmCurrency:    crm.currency     || o.crmCurrency     || 'UAH',
  };
}

const api = {
  getOrders: () => fetch(`${BASE()}/screenprint`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({op:'get'})
  }).then(async r => {
    // HTTP-помилка (напр. n8n повертає 500 на порожній таблиці) → порожній список
    if (!r.ok) return [];
    let data;
    try { data = await r.json(); } catch { return []; }
    // n8n може повернути {orders:[...]}, масив, або {} на порожній таблиці
    let list = [];
    if (data && Array.isArray(data.orders))  list = data.orders;
    else if (Array.isArray(data))            list = data;
    else if (data && Array.isArray(data.data)) list = data.data;
    // фільтруємо порожні рядки (alwaysOutputData дає {} або [{...без id...}])
    return list.filter(o => o && (o.id || o.orderId)).map(parseOrder).filter(Boolean);
  }),
  // мережева помилка тут не ловиться → OrdersProvider покаже екран помилки
  createOrder: (d)    => call('create', d),
  updateOrder: (id,d) => call('update', {...d, id}),
  deleteOrder: (id)   => call('delete', {id}),
};

const INK_TYPES = {
  plastisol: { label: 'Пластизольна', note: 'Полімеризація 120–160°C. Не сохне на трафареті. Найпоширеніша.' },
  water:     { label: 'Водна',        note: 'М\'яка на дотик, екологічна. Швидко сохне на сітці — потребує уваги.' },
  solvent:   { label: 'Сольвентна',   note: 'Для синтетики. Висока хімічна стійкість, потрібна вентиляція.' },
  discharge: { label: 'Розрядна',     note: 'Знебарвлює тканину. Тільки 100% бавовна темних кольорів.' },
  special:   { label: 'Спеціальна',   note: 'Металік, флуоресцентна, глітер, пуф — уточнювати окремо.' },
};

const POSITIONS = {
  front:  'Перед',
  back:   'Спина',
  sleeve: 'Рукав',
  chest:  'Лівий груд',
  other:  'Інше',
};

function posLabel(o) {
  if (Array.isArray(o.positions) && o.positions.length > 0)
    return o.positions.map(p => POSITIONS[p.position] || p.position).join(' + ');
  return POSITIONS[o.printPosition] || '—';
}

function sumColors(o) {
  if (Array.isArray(o.positions) && o.positions.length > 0)
    return o.positions.reduce((s, p) => s + (parseInt(p.colors) || 0), 0);
  return o.colors || 0;
}

const PRIORITIES = { urgent: '🔴 Терміново', week: '🟡 Цього тижня', queue: '🟢 В черзі' };
const STATUSES   = { accepted: 'Прийнято', in_progress: 'В роботі', ready: 'Готово', issued: 'Видано' };

// ── DATE UTILS ───────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function ensureWD(s) {
  let d = new Date((s||todayStr())+'T12:00:00');
  while (d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

function addWD(s, n) {
  if (!n||n<=0) return s;
  let d = new Date(s+'T12:00:00'), added=0;
  while (added<n) { d.setDate(d.getDate()+1); if (d.getDay()!==0&&d.getDay()!==6) added++; }
  return d.toISOString().split('T')[0];
}

function maxD(a,b) { if (!a) return b; if (!b) return a; return a>=b?a:b; }
function fmtD(s)   { if (!s) return '—'; const [y,m,d]=s.split('-'); return `${d}.${m}.${y}`; }
function fmtDs(s)  { if (!s) return '—'; const [,m,d]=s.split('-'); return `${d}.${m}`; }

// ── CORE LOGIC ────────────────────────────────────────────────────────────────
function recalc(orders) {
  const pMap = {urgent:0,week:1,queue:2};
  const active = orders.filter(o=>o.status!=='issued'&&o.status!=='ready').sort((a,b)=>{
    if ((pMap[a.priority]??2)!==(pMap[b.priority]??2)) return (pMap[a.priority]??2)-(pMap[b.priority]??2);
    return new Date(a.createdAt)-new Date(b.createdAt);
  });
  const issued = orders.filter(o=>o.status==='issued');
  let tail = null;
  const result = active.map(o=>{
    const earliest = ensureWD(o.hasProduct ? todayStr() : (o.expectedProductDate||todayStr()));
    const start    = tail ? maxD(earliest, addWD(tail,1)) : earliest;
    const rolls    = (o.items||0)*sumColors(o);
    const totalHours = Array.isArray(o.positions) && o.positions.length > 0
      ? o.positions.reduce((s,p) => {
          const cap = PRINT_SIZES[p.printSize]?.cap ?? CAP;
          const r = (o.items||0)*(parseInt(p.colors)||0);
          return s + (r>0 ? r*HOURS_PER_DAY/cap : 0);
        }, 0)
      : rolls*HOURS_PER_DAY/CAP;
    const printDays = totalHours>0 ? Math.ceil(totalHours/HOURS_PER_DAY) : 0;
    const days     = printDays+(o.isNewDesign?1:0);
    const end          = days>0 ? addWD(start,days) : start;
    const confirmedEnd = o.confirmedReadyDate ? ensureWD(o.confirmedReadyDate) : null;
    const effectiveEnd = confirmedEnd ? maxD(end, confirmedEnd) : end;
    if (confirmedEnd || days>0) tail = maxD(tail, effectiveEnd);
    return {...o, autoStart:start, autoEnd:effectiveEnd, rolls};
  });
  return [...result, ...issued.map(o=>({...o, rolls:(o.items||0)*sumColors(o)}))];
}

// ── CONTEXT ───────────────────────────────────────────────────────────────────
const ThemeCtx  = createContext();
const OrdersCtx = createContext();

function ThemeProvider({children}) {
  const [dark,setDark] = useState(()=>localStorage.getItem('sp_theme')==='dark');
  useEffect(()=>{
    localStorage.setItem('sp_theme',dark?'dark':'light');
    document.documentElement.classList.toggle('dark',dark);
  },[dark]);
  return <ThemeCtx.Provider value={{dark,setDark}}>{children}</ThemeCtx.Provider>;
}

function OrdersProvider({children}) {
  const [orders,setOrders] = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState(null);

  // Завантаження при старті
  useEffect(()=>{
    if (!BASE()) { setLoading(false); setError('no_config'); return; }
    api.getOrders()
      .then(data=>{ setOrders(recalc(Array.isArray(data)?data:[])); setLoading(false); })
      .catch(()=>{ setError('fetch_failed'); setLoading(false); });
  },[]);

  const addOrder = useCallback(async d=>{
    const newOrder = {...d, id:Date.now().toString(), createdAt:new Date().toISOString()};
    try {
      await api.createOrder(newOrder);
      setOrders(prev=>recalc([...prev, newOrder]));
    } catch { alert('Помилка збереження. Перевірте з\'єднання з n8n.'); }
  },[]);

  const updateOrder = useCallback(async (id,u)=>{
    try {
      setOrders(prev=>{
        const merged = prev.map(o=>{
          if(o.id!==id) return o;
          const updated={...o,...u};
          if('crmProducts' in u){
            let cd={}; if(typeof o.crmData==='string') try{cd=JSON.parse(o.crmData);}catch{}
            updated.crmData=JSON.stringify({...cd,products:updated.crmProducts});
          }
          return updated;
        });
        const full=merged.find(o=>o.id===id);
        api.updateOrder(id,full).catch(()=>alert('Помилка оновлення.'));
        return recalc(merged);
      });
    } catch { alert('Помилка оновлення.'); }
  },[]);

  const deleteOrder = useCallback(async id=>{
    try {
      await api.deleteOrder(id);
      setOrders(prev=>recalc(prev.filter(o=>o.id!==id)));
    } catch { alert('Помилка видалення.'); }
  },[]);

  const reload = useCallback(()=>{
    setLoading(true); setError(null);
    api.getOrders()
      .then(data=>{ setOrders(recalc(Array.isArray(data)?data:[])); setLoading(false); })
      .catch(()=>{ setError('fetch_failed'); setLoading(false); });
  },[]);

  return <OrdersCtx.Provider value={{orders,loading,error,addOrder,updateOrder,deleteOrder,reload}}>{children}</OrdersCtx.Provider>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function AppInner() {
  const [page,setPage] = useState('dashboard');
  const {loading,error,reload} = useContext(OrdersCtx);

  if (loading) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
      <div className="text-center space-y-3">
        <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"/>
        <p className="text-gray-500 dark:text-gray-400">Завантаження черги...</p>
      </div>
    </div>
  );

  if (error) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 p-4">
      <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 max-w-md w-full text-center space-y-4">
        <div className="text-5xl">⚠️</div>
        {error==='no_config' ? (
          <>
            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">n8n не налаштовано</h2>
            <p className="text-sm text-gray-500">Відкрийте файл <code className="bg-gray-100 dark:bg-gray-700 px-1 rounded">config.js</code> і замініть <code className="bg-gray-100 dark:bg-gray-700 px-1 rounded">N8N_BASE</code> на адресу вашого n8n.</p>
          </>
        ) : (
          <>
            <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">Не вдалося підключитись до n8n</h2>
            <p className="text-sm text-gray-500">Перевірте що n8n запущено і workflow активний.<br/>URL: <span className="font-mono text-blue-500">{BASE()||'не вказано'}</span></p>
          </>
        )}
        <button onClick={reload} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
          Спробувати ще раз
        </button>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">
      <Nav page={page} setPage={setPage}/>
      <main className="max-w-7xl mx-auto px-3 py-5">
        {page==='dashboard'    && <Dashboard/>}
        {page==='queue'        && <Queue/>}
        {page==='calculator'   && <Calculator/>}
        {page==='instructions' && <Instructions/>}
      </main>
    </div>
  );
}

function App() {
  return <ThemeProvider><OrdersProvider><AppInner/></OrdersProvider></ThemeProvider>;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function Nav({page,setPage}) {
  const {dark,setDark} = useContext(ThemeCtx);
  const tabs = [{id:'dashboard',e:'📊',l:'Дашборд'},{id:'queue',e:'📋',l:'Черга'},{id:'calculator',e:'🧮',l:'Калькулятор'},{id:'instructions',e:'📖',l:'Довідник'}];
  return (
    <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50">
      <div className="max-w-7xl mx-auto px-3 h-14 flex items-center justify-between">
        <span className="font-bold text-blue-600 dark:text-blue-400">
          <span className="hidden sm:inline">🖨 Шовкотрафарет</span>
          <span className="sm:hidden">🖨</span>
        </span>
        <nav className="flex gap-1">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setPage(t.id)}
              className={`px-2 sm:px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${page===t.id?'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300':'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
              <span className="hidden sm:inline">{t.e} {t.l}</span>
              <span className="sm:hidden text-lg">{t.e}</span>
            </button>
          ))}
        </nav>
        <button onClick={()=>setDark(!dark)} className="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          {dark?'☀️':'🌙'}
        </button>
      </div>
    </header>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard() {
  const {orders} = useContext(OrdersCtx);
  const today = todayStr();
  const tomorrow = addWD(today,1);

  const d = new Date(today+'T12:00:00');
  const diff = d.getDay()===0?-6:1-d.getDay();
  const wMon = new Date(d); wMon.setDate(d.getDate()+diff);
  const wSun = new Date(wMon); wSun.setDate(wMon.getDate()+6);
  const ws = wMon.toISOString().split('T')[0];
  const we = wSun.toISOString().split('T')[0];

  const rollsOn  = dt => orders.filter(o=>o.autoStart===dt&&o.status!=='issued').reduce((s,o)=>s+(o.rolls||0),0);
  const rollsWk  = orders.filter(o=>o.autoStart>=ws&&o.autoStart<=we&&o.status!=='issued').reduce((s,o)=>s+(o.rolls||0),0);
  const active   = orders.filter(o=>o.status!=='issued').length;
  const urgent   = orders.filter(o=>{ const dl=o.confirmedReadyDate||o.autoEnd; return (dl===today||dl===tomorrow)&&o.status!=='issued'&&o.status!=='ready'; });
  const inProg   = orders.filter(o=>o.status==='in_progress');

  const clr = v=>v>80?'bg-red-400':v>60?'bg-yellow-400':'bg-blue-400';

  return (
    <div className="space-y-5">
      <h1 className="text-2xl font-bold">Дашборд</h1>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {[
          {l:'Прокатів сьогодні', v:rollsOn(today),    max:CAP,    c:'blue'},
          {l:'Прокатів завтра',   v:rollsOn(tomorrow), max:CAP,    c:'indigo'},
          {l:'Прокатів тижня',    v:rollsWk,           max:CAP*5,  c:'purple'},
          {l:'Активних замовлень',v:active,             max:null,   c:'emerald'},
        ].map(({l,v,max,c})=>{
          const pct = max ? Math.min(100,Math.round(v/max*100)) : null;
          const colors = {blue:'bg-blue-50 dark:bg-blue-950 border-blue-200 dark:border-blue-800',indigo:'bg-indigo-50 dark:bg-indigo-950 border-indigo-200 dark:border-indigo-800',purple:'bg-purple-50 dark:bg-purple-950 border-purple-200 dark:border-purple-800',emerald:'bg-emerald-50 dark:bg-emerald-950 border-emerald-200 dark:border-emerald-800'};
          const bar = {blue:clr(pct),indigo:clr(pct),purple:clr(pct),emerald:'bg-emerald-400'};
          return (
            <div key={l} className={`rounded-xl border p-4 ${colors[c]}`}>
              <p className="text-xs text-gray-500 dark:text-gray-400">{l}</p>
              <p className="text-3xl font-bold mt-1">{v}</p>
              {max && <p className="text-xs text-gray-400 mt-0.5">з {max}</p>}
              {pct!==null && <div className="mt-2 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div className={`h-full rounded-full transition-all ${bar[c]}`} style={{width:`${pct}%`}}/></div>}
            </div>
          );
        })}
      </div>

      {urgent.length>0 && (
        <div className="bg-red-50 dark:bg-red-950 border border-red-300 dark:border-red-800 rounded-xl p-4">
          <h2 className="font-bold text-red-700 dark:text-red-400 mb-3">🚨 Термінові — дедлайн сьогодні або завтра</h2>
          <div className="grid sm:grid-cols-2 gap-2">
            {urgent.map(o=>(
              <div key={o.id} className="bg-white dark:bg-gray-800 rounded-lg p-3 border border-red-200 dark:border-red-700">
                <div className="flex justify-between"><span className="font-semibold">{o.client}</span>
                  <span className="text-xs bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 px-2 py-0.5 rounded">{fmtD(o.confirmedReadyDate||o.autoEnd)}</span>
                </div>
                <p className="text-sm text-gray-500 mt-1">{o.rolls} прок. · {o.items}шт × {o.colors}кол. · {STATUSES[o.status]}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {inProg.length>0 && (
        <div className="bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800 rounded-xl p-4">
          <h2 className="font-bold text-blue-700 dark:text-blue-400 mb-3">⚙️ Зараз у виробництві</h2>
          <div className="grid sm:grid-cols-2 gap-2">
            {inProg.map(o=>(
              <div key={o.id} className="bg-white dark:bg-gray-800 rounded-lg p-3 border border-blue-200 dark:border-blue-700">
                <div className="flex justify-between"><span className="font-semibold">{o.client}</span>
                  <span className="text-xs text-blue-600 dark:text-blue-400">{fmtD(o.confirmedReadyDate||o.autoEnd)}</span>
                </div>
                <p className="text-sm text-gray-500 mt-1">{o.rolls} прок. · {INK_TYPES[o.inkType]?.label||'—'} · {posLabel(o)}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {urgent.length===0 && (
        <div className="bg-green-50 dark:bg-green-950 border border-green-200 dark:border-green-800 rounded-xl p-3 text-center">
          <p className="text-green-700 dark:text-green-400 text-sm">✅ Термінових замовлень немає</p>
        </div>
      )}
    </div>
  );
}

// ── QUEUE ─────────────────────────────────────────────────────────────────────
function Queue() {
  const {orders,addOrder,updateOrder,deleteOrder} = useContext(OrdersCtx);
  const [modal,setModal] = useState(null);
  const [confirmDel,setConfirmDel] = useState(null); // {id, label}

  const sorted = useMemo(()=>{
    const toMs = d => d ? new Date(d).getTime() : Infinity;
    return [...orders].sort((a,b)=>{
      const da = toMs(a.confirmedReadyDate);
      const db = toMs(b.confirmedReadyDate);
      if (da !== db) return da - db;
      return new Date(a.createdAt) - new Date(b.createdAt);
    });
  },[orders]);

  function handleDel(o) {
    const label = [o.keycrmId?`#${o.keycrmId}`:'', o.client||''].filter(Boolean).join(' · ') || o.id;
    setConfirmDel({id: o.id, label});
  }

  return (
    <div className="space-y-4">
      <div className="flex justify-between items-center">
        <h1 className="text-2xl font-bold">Черга замовлень</h1>
        <button onClick={()=>setModal({order:null})} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors">
          + Додати замовлення
        </button>
      </div>

      {sorted.length===0 && (
        <div className="text-center text-gray-400 py-16">
          <p className="text-5xl mb-3">📋</p>
          <p>Замовлень немає. Натисніть «+ Додати замовлення».</p>
        </div>
      )}

      {sorted.length>0 && (
        <div className="grid items-center px-4 py-1 text-xs font-semibold text-gray-400 uppercase tracking-wide gap-x-3"
          style={{gridTemplateColumns:'2rem 5rem 1fr 10rem 5rem 4rem 8rem 3rem'}}>
          <span className="text-center">#</span>
          <span>№ замовл.</span>
          <span>Статус CRM</span>
          <span>Менеджер</span>
          <span>Дата готовн.</span>
          <span>К-сть</span>
          <span className="text-center">Пріоритет</span>
          <span className="text-center">Статус</span>
          <span/>
        </div>
      )}

      <div className="space-y-2">
        {sorted.map((o,i)=>(
          <OrderCard key={o.id} o={o} idx={i+1}
            onDel={()=>handleDel(o)}
            onChange={u=>updateOrder(o.id,u)}/>
        ))}
      </div>

      {modal && (
        <Modal order={modal.order} onClose={()=>setModal(null)}
          onSave={d=>{ modal.order?updateOrder(modal.order.id,d):addOrder(d); setModal(null); }}/>
      )}

      {confirmDel && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={()=>setConfirmDel(null)}>
          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 max-w-sm w-full space-y-4" onClick={e=>e.stopPropagation()}>
            <div className="flex items-start gap-3">
              <div className="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/40 flex items-center justify-center shrink-0 text-lg">🗑</div>
              <div>
                <p className="font-semibold text-gray-900 dark:text-gray-100">Видалити замовлення?</p>
                <p className="text-sm text-gray-500 dark:text-gray-400 mt-0.5">{confirmDel.label}</p>
                <p className="text-xs text-red-500 mt-1">Цю дію не можна скасувати.</p>
              </div>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setConfirmDel(null)}
                className="px-4 py-2 rounded-lg text-sm font-medium border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                Скасувати
              </button>
              <button onClick={()=>{ deleteOrder(confirmDel.id); setConfirmDel(null); }}
                className="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-700 text-white transition-colors">
                Видалити
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function OrderCard({o,idx,onDel,onChange}) {
  const [expanded,setExpanded] = useState(false);
  const [saving,setSaving] = useState(false);
  const [edit,setEdit] = useState(null);
  const initEdit = useRef(null);

  function openExpand() {
    if (!expanded) {
      const snap={
        positions: o.positions?.length>0 ? o.positions : [{position: o.printPosition||'front', colors: o.colors||'', printSize:'a4'}],
        inkType: o.inkType||'plastisol',
        isNewDesign: o.isNewDesign||false,
        hasProduct: o.hasProduct!==false,
        expectedProductDate: o.expectedProductDate||'',
        fileReceived: o.fileReceived!==false,
        confirmedReadyDate: o.confirmedReadyDate||'',
        notes: o.notes||'',
        crmProducts: o.crmProducts||[],
        items: o.items||'',
      };
      setEdit(snap);
      initEdit.current=JSON.stringify(snap);
    }
    setExpanded(v=>!v);
  }

  async function saveEdit() {
    setSaving(true);
    await onChange(edit);
    initEdit.current=JSON.stringify(edit);
    setSaving(false);
    setExpanded(false);
  }

  const isDirty = edit ? JSON.stringify(edit)!==initEdit.current : false;

  const prChip = {
    urgent:'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300',
    week:'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/50 dark:text-yellow-300',
    queue:'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300',
  }[o.priority]||'bg-gray-100 text-gray-600';


  const prLabels = {urgent:'Терміново',week:'Цього тижня',queue:'В черзі'};

  const statusBar = {
    in_progress: 'border-l-4 border-l-blue-500',
    ready:       'border-l-4 border-l-green-500',
    issued:      'border-l-4 border-l-gray-300 dark:border-l-gray-600 opacity-60',
  }[o.status] || '';

  return (
    <div className={`bg-white dark:bg-gray-800 rounded-xl border transition-all ${statusBar} ${expanded?'border-blue-300 dark:border-blue-600 shadow-lg':'border-gray-200 dark:border-gray-700'}`}>
      {/* ── Collapsed header — один рядок ── */}
      <div className="grid items-center px-4 py-3 cursor-pointer select-none gap-x-3"
        style={{gridTemplateColumns:'2rem 5rem 1fr 10rem 5rem 4rem 8rem 8rem 3rem'}}
        onClick={openExpand}>
        <span className="text-sm text-gray-400 text-center">{idx}</span>
        {o.keycrmId
          ? <a href={`https://pngstudio.keycrm.app/app/orders/view/${o.keycrmId}`} target="_blank" rel="noopener noreferrer"
              className="font-mono text-sm text-blue-500 hover:underline truncate" onClick={e=>e.stopPropagation()}>#{o.keycrmId}</a>
          : <span className="font-mono text-sm text-gray-400 truncate">—</span>}
        <span className="text-sm text-indigo-400 truncate">{o.crmStatusLabel||'—'}</span>
        <span className="text-sm text-gray-300 truncate">{o.crmManager||'—'}</span>
        <span className="text-sm text-gray-400">{o.confirmedReadyDate ? fmtDs(o.confirmedReadyDate) : '—'}</span>
        <span className="text-sm text-gray-400">{o.items>0 ? `${o.items} шт` : '—'}</span>
        <span className={`text-sm px-2 py-0.5 rounded-full font-medium text-center ${prChip}`}>{prLabels[o.priority]||o.priority}</span>
        <span className="flex items-center gap-0.5" onClick={e=>e.stopPropagation()}>
          <button onClick={e=>{e.stopPropagation();onDel();}} title="Видалити"
            className="text-gray-300 hover:text-red-500 dark:text-gray-600 dark:hover:text-red-400 transition-colors p-1">✕</button>
          <span className="text-gray-400 text-sm" onClick={openExpand}>{expanded?'▲':'▼'}</span>
        </span>
      </div>

      {/* ── Expanded panel ── */}
      {expanded && edit && (
        <div className="border-t border-gray-100 dark:border-gray-700 px-4 py-4 space-y-5">

          {/* Production settings */}
          <div className="space-y-3">
            <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Виробництво</p>
            <div className="grid grid-cols-3 gap-3">
              <FL label="Кількість виробів">
                <input className="inp" type="number" min="1" value={edit.items||o.items||''} onChange={e=>setEdit(p=>({...p,items:e.target.value}))}/>
              </FL>
              <FL label="Пріоритет">
                <select className="inp" value={o.priority} onChange={e=>onChange({priority:e.target.value})}>
                  {Object.entries(PRIORITIES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </FL>
              <FL label="Тип фарби">
                <select className="inp" value={edit.inkType} onChange={e=>setEdit(p=>({...p,inkType:e.target.value}))}>
                  {Object.entries(INK_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </FL>
            </div>

            <FL label="Позиції друку">
              <div className="space-y-2">
                <div className="flex gap-1 text-xs text-gray-400 dark:text-gray-500 px-0.5">
                  <span className="flex-1">Місце</span>
                  <span className="w-16 shrink-0 text-center">Кольорів</span>
                  <span className="w-24 shrink-0 text-center">Формат принта</span>
                  <span className="w-5 shrink-0"/>
                </div>
                {edit.positions.map((pos,pi)=>{
                  const upd=(k,v)=>{ const ps=[...edit.positions]; ps[pi]={...ps[pi],[k]:v}; setEdit(p=>({...p,positions:ps})); };
                  return (
                    <div key={pi} className="flex gap-1 items-center">
                      <select className="inp flex-1 min-w-0" value={pos.position} onChange={e=>upd('position',e.target.value)}>
                        {Object.entries(POSITIONS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                      </select>
                      <input className="inp w-16 shrink-0" type="number" min="1" value={pos.colors} onChange={e=>upd('colors',e.target.value)} placeholder="кол."/>
                      <select className="inp w-24 shrink-0 text-xs" value={pos.printSize||'a4'} onChange={e=>upd('printSize',e.target.value)}>
                        {Object.entries(PRINT_SIZES).map(([k,s])=><option key={k} value={k}>{s.label}</option>)}
                      </select>
                      {edit.positions.length>1 && (
                        <button type="button" onClick={()=>setEdit(p=>({...p,positions:p.positions.filter((_,j)=>j!==pi)}))}
                          className="text-red-400 hover:text-red-600 shrink-0 px-1">✕</button>
                      )}
                    </div>
                  );
                })}
                <button type="button" onClick={()=>setEdit(p=>({...p,positions:[...p.positions,{position:'front',colors:'',printSize:'a4'}]}))}
                  className="text-sm text-blue-600 dark:text-blue-400 hover:underline">+ Додати позицію</button>
              </div>
            </FL>

            <div className="flex flex-wrap gap-4 text-sm">
              {[['isNewDesign','Нова розробка (+1 день)'],['hasProduct','Продукція є'],['fileReceived','Файл отримано']].map(([k,l])=>(
                <label key={k} className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={!!edit[k]} onChange={e=>setEdit(p=>({...p,[k]:e.target.checked}))} className="w-4 h-4 accent-blue-600"/>
                  {l}
                </label>
              ))}
            </div>
            {!edit.hasProduct && (
              <FL label="Очікується продукція">
                <input className="inp" type="date" value={edit.expectedProductDate} onChange={e=>setEdit(p=>({...p,expectedProductDate:e.target.value}))}/>
              </FL>
            )}

            <FL label="Примітки">
              <textarea className="inp" rows="2" value={edit.notes} onChange={e=>setEdit(p=>({...p,notes:e.target.value}))} placeholder="Примітки..."/>
            </FL>

            <div className="grid grid-cols-2 gap-3">
              <FL label="Старт (авто)">
                <div className="inp bg-gray-50 dark:bg-gray-700/50 text-gray-500">{fmtD(o.autoStart)||'—'}</div>
              </FL>
              <FL label="Дата готовності">
                <input className="inp" type="date" value={edit.confirmedReadyDate} onChange={e=>setEdit(p=>({...p,confirmedReadyDate:e.target.value}))}/>
              </FL>
            </div>
          </div>

          <div className="flex gap-2 pt-1">
            {isDirty && (
              <button onClick={saveEdit} disabled={saving}
                className="flex-1 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white py-2 rounded-lg font-medium text-sm transition-colors">
                {saving?'Збереження...':'💾 Зберегти'}
              </button>
            )}
          </div>

          {edit.crmProducts.length>0 && (
            <div>
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Товари</p>
                <p className="text-xs text-gray-400">✕ — видалити зі списку</p>
              </div>
              <div className="flex items-center gap-3 px-3 mb-0.5 text-xs text-gray-400">
                <span className="w-8 shrink-0"/>
                <span className="shrink-0 w-20">арт.</span>
                <span className="flex-1">назва</span>
                <span className="shrink-0 w-10 text-right">кіл.</span>
              </div>
              <div className="space-y-1">
                {edit.crmProducts.map((p,i)=>(
                  <div key={i} className="flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2 border border-gray-100 dark:border-gray-700">
                    {p.thumbnail
                      ? <img src={p.thumbnail} alt={p.name} className="w-8 h-8 object-cover rounded shrink-0"/>
                      : <span className="text-lg shrink-0">📦</span>
                    }
                    {p.sku && <span className="text-sm text-gray-400 shrink-0 font-mono w-20 truncate">{p.sku}</span>}
                    <span className="flex-1 text-base font-medium truncate">{p.name}</span>
                    <span className="text-sm font-semibold shrink-0 w-10 text-right">{p.qty}</span>
                    <button onClick={()=>{const np=edit.crmProducts.filter((_,j)=>j!==i);setEdit(prev=>{const upd={...prev,crmProducts:np};initEdit.current=JSON.stringify(upd);return upd;});onChange({crmProducts:np});}}
                      className="text-gray-300 hover:text-red-500 transition-colors shrink-0 p-1 rounded hover:bg-red-50 dark:hover:bg-red-950/30">✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function Modal({order,onClose,onSave}) {
  const isNew = !order;
  const defaultPositions = order?.positions
    || (order?.printPosition ? [{position:order.printPosition, colors:order.colors||'', printSize:'a4'}]
                              : [{position:'front', colors:'', printSize:'a4'}]);
  const [f,setF] = useState({
    keycrmId: order?.keycrmId||'', client: order?.client||'',
    priority: order?.priority||'queue', status: order?.status||'accepted',
    items: order?.items||'',
    positions: defaultPositions,
    isNewDesign: order?.isNewDesign||false,
    hasProduct: order?.hasProduct!==false,
    expectedProductDate: order?.expectedProductDate||'',
    fileReceived: order?.fileReceived!==false,
    inkType: order?.inkType||'plastisol',
    confirmedReadyDate: order?.confirmedReadyDate||'',
    notes: order?.notes||'',
    crmProducts: order?.crmProducts||[],
    crmManager: order?.crmManager||'',
    crmPhone: order?.crmPhone||'',
    crmDelivery: order?.crmDelivery||'',
    crmStatusLabel: order?.crmStatusLabel||'',
    crmTrackingCode: order?.crmTrackingCode||'',
    crmReceiveAt: order?.crmReceiveAt||'',
    crmTags: order?.crmTags||'',
    crmTotalPaid: order?.crmTotalPaid||0,
    crmCurrency: order?.crmCurrency||'UAH',
  });
  const u = k => v => setF(p=>({...p,[k]:v}));
  const [crmLoading,setCrmLoading] = useState(false);
  const [crmFetched,setCrmFetched] = useState(false);
  const submittedRef = useRef(false);

  async function fetchFromCRM() {
    const id = f.keycrmId.trim();
    if (!id) return alert('Вкажіть ID KeyCRM');
    setCrmLoading(true);
    try {
      const r = await call('crm_fetch', {orderId: id});
      if (r.ok) {
        setCrmFetched(true);
        setF(p=>({...p,
          client: r.client||p.client,
          notes: r.notes||p.notes,
          items: r.items||p.items,
          crmProducts: r.products||[],
          crmManager: r.manager||'',
          crmPhone: r.phone||'',
          crmDelivery: r.deliveryService||'',
          crmStatusLabel: r.statusLabel||'',
          crmTrackingCode: r.trackingCode||'',
          crmReceiveAt: r.receiveAt||'',
          crmTags: r.tags||'',
          crmTotalPaid: r.totalPaid||0,
          crmCurrency: r.currency||'UAH',
          // shipping_date_actual як стартова дата готовності (тільки якщо ще не задана вручну)
          confirmedReadyDate: p.confirmedReadyDate || r.readyDate || '',
        }));
      } else { alert('Замовлення не знайдено'); }
    } catch { alert('Помилка запиту до KeyCRM'); }
    finally { setCrmLoading(false); }
  }

  function quickSave() {
    if (submittedRef.current) return;
    if (!f.client.trim()) return alert('Не вдалось отримати клієнта з CRM');
    submittedRef.current = true;
    onSave({...f, items: parseInt(f.items)||0});
  }

  // ── Step 1: Enter CRM ID ──
  if (isNew && !crmFetched) {
    return (
      <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md">
          <div className="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <h2 className="text-lg font-bold">Нове замовлення</h2>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">✕</button>
          </div>
          <div className="px-6 py-6 space-y-4">
            <FL label="Номер замовлення KeyCRM">
              <div className="flex gap-2">
                <input className="inp flex-1" value={f.keycrmId} onChange={e=>u('keycrmId')(e.target.value)}
                  placeholder="104499" autoFocus onKeyDown={e=>e.key==='Enter'&&fetchFromCRM()}/>
                <button type="button" onClick={fetchFromCRM} disabled={crmLoading}
                  className="shrink-0 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-medium transition-colors whitespace-nowrap">
                  {crmLoading ? '...' : '⬇ Завантажити'}
                </button>
              </div>
            </FL>
            <div className="border-t border-gray-100 dark:border-gray-700 pt-4">
              <p className="text-xs text-gray-400 mb-3">Або додати вручну без CRM:</p>
              <FL label="Клієнт">
                <input className="inp" value={f.client} onChange={e=>u('client')(e.target.value)} placeholder="Назва / ПІБ"/>
              </FL>
              {f.client && (
                <button onClick={quickSave} className="mt-3 w-full bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-lg font-medium text-sm transition-colors">
                  Додати вручну
                </button>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Step 2: Preview after CRM fetch ──
  if (isNew && crmFetched) {
    return (
      <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[92vh] overflow-y-auto">
          <div className="sticky top-0 bg-white dark:bg-gray-800 px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <div>
              <h2 className="text-lg font-bold">Замовлення #{f.keycrmId}</h2>
              {f.crmStatusLabel && <p className="text-xs text-indigo-600 dark:text-indigo-400">{f.crmStatusLabel}</p>}
            </div>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl">✕</button>
          </div>
          <div className="px-6 py-4 space-y-4">
            {/* Client summary */}
            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-xl p-4 space-y-2">
              <p className="font-semibold text-lg">{f.client}</p>
              <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500">
                {f.crmPhone    && <span>📞 {f.crmPhone}</span>}
                {f.crmManager  && <span>👤 {f.crmManager}</span>}
                {f.items>0     && <span>📦 {f.items} виробів</span>}
                {f.crmDelivery && <span>🚚 {f.crmDelivery}</span>}
                {f.crmTotalPaid>0 && <span>💳 {f.crmTotalPaid} {f.crmCurrency}</span>}
                {f.crmTags     && <span>🏷 {f.crmTags}</span>}
              </div>
            </div>

            {/* Products list */}
            {f.crmProducts.length>0 && (
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-sm font-semibold text-gray-600 dark:text-gray-400">Товари <span className="font-normal text-gray-400">({f.crmProducts.length})</span></p>
                  <p className="text-xs text-gray-400">✕ — видалити зі списку</p>
                </div>
                <div className="flex items-center gap-3 px-3 mb-0.5 text-xs text-gray-400">
                  <span className="w-8 shrink-0"/>
                  <span className="shrink-0 w-20">арт.</span>
                  <span className="flex-1">назва</span>
                  <span className="shrink-0 w-10 text-right">кіл.</span>
                </div>
                <div className="space-y-1">
                  {f.crmProducts.map((p,i)=>(
                    <div key={i} className="flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2 border border-gray-100 dark:border-gray-700">
                      {p.thumbnail
                        ? <img src={p.thumbnail} alt={p.name} className="w-8 h-8 object-cover rounded shrink-0"/>
                        : <span className="text-lg shrink-0">📦</span>
                      }
                      {p.sku && <span className="text-sm text-gray-400 shrink-0 font-mono w-20 truncate">{p.sku}</span>}
                      <span className="flex-1 text-base font-medium truncate">{p.name}</span>
                      <span className="text-sm font-semibold shrink-0 w-10 text-right">{p.qty}</span>
                      <button onClick={()=>u('crmProducts')(f.crmProducts.filter((_,j)=>j!==i))}
                        className="text-gray-300 hover:text-red-500 transition-colors shrink-0 p-1 rounded hover:bg-red-50 dark:hover:bg-red-950/30">✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Priority + items */}
            <div className="grid grid-cols-2 gap-3">
              <FL label="Пріоритет">
                <select className="inp" value={f.priority} onChange={e=>u('priority')(e.target.value)}>
                  {Object.entries(PRIORITIES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </FL>
              <FL label="Виробів">
                <input className="inp" type="number" min="1" value={f.items} onChange={e=>u('items')(e.target.value)} placeholder="100"/>
              </FL>
            </div>

            <div className="flex gap-3">
              <button onClick={quickSave}
                className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-semibold transition-colors">
                ✓ Додати до черги
              </button>
              <button onClick={onClose}
                className="px-5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 py-2.5 rounded-lg font-medium transition-colors">
                Скасувати
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Edit existing order ── (old full form, kept as-is)
  const totalColors = f.positions.reduce((s,p)=>s+(parseInt(p.colors)||0),0);
  const rolls = (parseInt(f.items)||0)*totalColors;
  const totalHours = f.positions.reduce((s,p)=>{
    const cap=PRINT_SIZES[p.printSize||'a4']?.cap??CAP;
    const r=(parseInt(f.items)||0)*(parseInt(p.colors)||0);
    return s+(r>0?r*HOURS_PER_DAY/cap:0);
  },0);
  const printDays = totalHours>0?Math.ceil(totalHours/HOURS_PER_DAY):0;
  const days = printDays+(f.isNewDesign?1:0);

  function submit(e) {
    e.preventDefault();
    if (!f.client.trim()) return alert('Вкажіть клієнта');
    if (!f.items) return alert('Вкажіть кількість виробів');
    onSave({...f, items:parseInt(f.items)||0, positions:f.positions.map(p=>({...p,colors:parseInt(p.colors)||0}))});
  }

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[92vh] overflow-y-auto">
        <div className="sticky top-0 bg-white dark:bg-gray-800 px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
          <h2 className="text-lg font-bold">Редагувати замовлення</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">✕</button>
        </div>
        <form onSubmit={submit} className="px-6 py-4 space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <FL label="ID KeyCRM"><input className="inp" value={f.keycrmId} onChange={e=>u('keycrmId')(e.target.value)} placeholder="123456"/></FL>
            <FL label="Клієнт *"><input className="inp" value={f.client} onChange={e=>u('client')(e.target.value)} placeholder="Назва / ПІБ" required/></FL>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <FL label="Пріоритет">
              <select className="inp" value={f.priority} onChange={e=>u('priority')(e.target.value)}>
                {Object.entries(PRIORITIES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </FL>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <FL label="Виробів *"><input className="inp" type="number" min="1" value={f.items} onChange={e=>u('items')(e.target.value)} placeholder="100" required/></FL>
            <FL label="Прокатів всього"><div className="inp bg-gray-50 dark:bg-gray-700 font-bold text-blue-600 dark:text-blue-400">{rolls||'—'}</div></FL>
          </div>
          <FL label="Позиції друку">
            <div className="space-y-2">
              <div className="flex gap-1 text-xs text-gray-400 dark:text-gray-500 px-0.5">
                <span className="flex-1">Місце</span>
                <span className="w-16 shrink-0 text-center">Кольорів</span>
                <span className="w-24 shrink-0 text-center">Формат принта</span>
                <span className="w-5 shrink-0"/>
              </div>
              {f.positions.map((pos,idx)=>{
                const updatePos=(key,val)=>{ const ps=[...f.positions]; ps[idx]={...ps[idx],[key]:val}; u('positions')(ps); };
                return (
                  <div key={idx} className="flex gap-1 items-center">
                    <select className="inp flex-1 min-w-0" value={pos.position} onChange={e=>updatePos('position',e.target.value)}>
                      {Object.entries(POSITIONS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </select>
                    <input className="inp w-16 shrink-0" type="number" min="1" value={pos.colors} onChange={e=>updatePos('colors',e.target.value)} placeholder="кол."/>
                    <select className="inp w-24 shrink-0 text-xs" value={pos.printSize||'a4'} onChange={e=>updatePos('printSize',e.target.value)}>
                      {Object.entries(PRINT_SIZES).map(([k,s])=><option key={k} value={k}>{s.label}</option>)}
                    </select>
                    {f.positions.length>1 && (
                      <button type="button" onClick={()=>u('positions')(f.positions.filter((_,i)=>i!==idx))} className="text-red-400 hover:text-red-600 shrink-0 px-1">✕</button>
                    )}
                  </div>
                );
              })}
              <button type="button" onClick={()=>u('positions')([...f.positions,{position:'front',colors:'',printSize:'a4'}])} className="text-sm text-blue-600 dark:text-blue-400 hover:underline">+ Додати позицію</button>
            </div>
          </FL>
          <div className="flex flex-wrap gap-4 text-sm">
            {[['isNewDesign','Нова розробка (+1 день)'],['hasProduct','Продукція є'],['fileReceived','Файл отримано']].map(([k,l])=>(
              <label key={k} className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={!!f[k]} onChange={e=>u(k)(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
                {l}
              </label>
            ))}
          </div>
          {!f.hasProduct && (
            <FL label="Очікується продукція">
              <input className="inp" type="date" value={f.expectedProductDate} onChange={e=>u('expectedProductDate')(e.target.value)} min={todayStr()}/>
            </FL>
          )}
          {rolls>0 && (
            <div className="bg-blue-50 dark:bg-blue-950 rounded-lg p-3 text-sm space-y-1 text-gray-600 dark:text-gray-300">
              {f.positions.map((p,i)=>{
                const cap=PRINT_SIZES[p.printSize||'a4']?.cap??CAP;
                const r=(parseInt(f.items)||0)*(parseInt(p.colors)||0);
                const h=r>0?r*HOURS_PER_DAY/cap:0;
                return <p key={i} className="text-xs">{POSITIONS[p.position]||p.position}: {r} прок. ({PRINT_SIZES[p.printSize||'a4']?.label}) → {h%1===0?h:h.toFixed(1)} год</p>;
              })}
              <div className="grid grid-cols-2 gap-2 pt-1 border-t border-blue-200 dark:border-blue-800 mt-1">
                <span>Годин на друк:</span><span className="font-semibold text-blue-700 dark:text-blue-300">{totalHours%1===0?totalHours:totalHours.toFixed(1)} год</span>
                <span>Днів виробництва:</span><span className="font-semibold text-blue-700 dark:text-blue-300">{days}</span>
              </div>
            </div>
          )}
          <FL label="Підтверджена дата готовності">
            <input className="inp" type="date" value={f.confirmedReadyDate} onChange={e=>u('confirmedReadyDate')(e.target.value)}/>
          </FL>
          <FL label="Примітки">
            <textarea className="inp" rows="2" value={f.notes} onChange={e=>u('notes')(e.target.value)} placeholder="Додаткова інформація..."/>
          </FL>
          <div className="flex gap-3 pt-1">
            <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition-colors">Зберегти</button>
            <button type="button" onClick={onClose} className="flex-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 py-2 rounded-lg font-medium transition-colors">Скасувати</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function FL({label,children}) {
  return <div><label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">{label}</label>{children}</div>;
}

// ── CALCULATOR ────────────────────────────────────────────────────────────────
function Calculator() {
  const {orders} = useContext(OrdersCtx);
  const [mode,setMode] = useState('standard'); // 'standard' | 'volume'
  const [c,setC] = useState({items:'',positions:[{position:'front',colors:'',printSize:'a4'}],rollsPerItem:'',isNewDesign:false,hasProduct:true,expectedProductDate:''});
  const u = k => v => setC(p=>({...p,[k]:v}));

  const volRolls  = (parseInt(c.items)||0)*(parseInt(c.rollsPerItem)||0);
  const stdRolls  = c.positions.reduce((s,p) => s + (parseInt(c.items)||0)*(parseInt(p.colors)||0), 0);
  const rolls     = mode==='volume' ? volRolls : stdRolls;

  const totalHours = mode==='volume'
    ? (volRolls>0 ? volRolls*HOURS_PER_DAY/(PRINT_SIZES[c.printSize||'a4']?.cap??CAP) : 0)
    : c.positions.reduce((s,p) => {
        const cap = PRINT_SIZES[p.printSize]?.cap ?? CAP;
        const r = (parseInt(c.items)||0)*(parseInt(p.colors)||0);
        return s + (r>0 ? r*HOURS_PER_DAY/cap : 0);
      }, 0);
  const printDays = totalHours>0 ? Math.ceil(totalHours/HOURS_PER_DAY) : 0;
  const days      = printDays+(c.isNewDesign?1:0);
  const latestEnd = orders.filter(o=>o.status!=='issued'&&o.autoEnd).reduce((m,o)=>maxD(m,o.autoEnd),null);
  const earliest  = ensureWD(c.hasProduct?todayStr():(c.expectedProductDate||todayStr()));
  const startDate = latestEnd ? maxD(earliest,addWD(latestEnd,1)) : earliest;
  const endDate   = days>0 ? addWD(startDate,days) : null;

  return (
    <div className="space-y-5 max-w-lg">
      <h1 className="text-2xl font-bold">Калькулятор дат</h1>

      {/* Mode switcher */}
      <div className="flex gap-2 bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
        {[['standard','🎨 По кольорах'],['volume','📦 Об\'ємний']].map(([m,l])=>(
          <button key={m} onClick={()=>setMode(m)}
            className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${mode===m?'bg-white dark:bg-gray-700 shadow text-blue-600 dark:text-blue-400':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>
            {l}
          </button>
        ))}
      </div>

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 space-y-4">
        {mode==='standard' ? (
          <div className="space-y-3">
            <FL label="Кількість виробів">
              <input className="inp" type="number" min="1" value={c.items} onChange={e=>u('items')(e.target.value)} placeholder="100"/>
            </FL>
            <FL label="Позиції друку">
              <div className="space-y-2">
                <div className="flex gap-1 text-xs text-gray-400 dark:text-gray-500 px-0.5">
                  <span className="flex-1">Місце</span>
                  <span className="w-16 shrink-0 text-center">Кольорів</span>
                  <span className="w-24 shrink-0 text-center">Формат принта</span>
                  <span className="w-5 shrink-0"/>
                </div>
                {c.positions.map((pos,idx)=>{
                  const updatePos = (key,val) => { const ps=[...c.positions]; ps[idx]={...ps[idx],[key]:val}; u('positions')(ps); };
                  return (
                    <div key={idx} className="flex gap-1 items-center">
                      <select className="inp flex-1 min-w-0" value={pos.position} onChange={e=>updatePos('position',e.target.value)}>
                        {Object.entries(POSITIONS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                      </select>
                      <input className="inp w-16 shrink-0" type="number" min="1" value={pos.colors} onChange={e=>updatePos('colors',e.target.value)} placeholder="кол."/>
                      <select className="inp w-24 shrink-0 text-xs" value={pos.printSize||'a4'} onChange={e=>updatePos('printSize',e.target.value)}>
                        {Object.entries(PRINT_SIZES).map(([k,s])=><option key={k} value={k}>{s.label}</option>)}
                      </select>
                      {c.positions.length>1 && (
                        <button type="button" onClick={()=>u('positions')(c.positions.filter((_,i)=>i!==idx))} className="text-red-400 hover:text-red-600 shrink-0 px-1">✕</button>
                      )}
                    </div>
                  );
                })}
                <button type="button" onClick={()=>u('positions')([...c.positions,{position:'front',colors:'',printSize:'a4'}])} className="text-sm text-blue-600 dark:text-blue-400 hover:underline">+ Додати позицію</button>
              </div>
              <p className="text-xs text-gray-400 mt-1">Кожна позиція — окремий прогін. Дні сумуються.</p>
            </FL>
          </div>
        ) : (
          <>
            <div className="grid grid-cols-2 gap-4">
              <FL label="Кількість виробів"><input className="inp" type="number" min="1" value={c.items} onChange={e=>u('items')(e.target.value)} placeholder="300"/></FL>
              <FL label="Прокатів на виріб"><input className="inp" type="number" min="1" value={c.rollsPerItem} onChange={e=>u('rollsPerItem')(e.target.value)} placeholder="5"/></FL>
            </div>
            <FL label="Формат принта">
              <div className="grid grid-cols-4 gap-1">
                {Object.entries(PRINT_SIZES).map(([k,s])=>(
                  <button key={k} type="button" onClick={()=>u('printSize')(k)}
                    className={`py-2 rounded-lg text-xs font-medium border transition-colors ${(c.printSize||'a4')===k?'bg-blue-600 border-blue-600 text-white':'border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 hover:border-blue-400'}`}>
                    <div>{s.label}</div>
                    <div className="font-normal opacity-70">{s.cap}/день</div>
                  </button>
                ))}
              </div>
            </FL>
            {c.items && c.rollsPerItem && (
              <div className="bg-gray-50 dark:bg-gray-700 rounded-lg px-4 py-3 text-sm font-mono">
                <span className="text-gray-500">{c.items} вир. × {c.rollsPerItem} прок. = </span>
                <span className="text-blue-600 dark:text-blue-400 font-bold text-lg">{rolls} прокатів</span>
              </div>
            )}
          </>
        )}
        <div className="flex flex-wrap gap-4 text-sm">
          {[['isNewDesign','Нова розробка (+1 день)'],['hasProduct','Продукція є']].map(([k,l])=>(
            <label key={k} className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={!!c[k]} onChange={e=>u(k)(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
              {l}
            </label>
          ))}
        </div>
        {!c.hasProduct && (
          <FL label="Очікувана дата надходження">
            <input className="inp" type="date" value={c.expectedProductDate} onChange={e=>u('expectedProductDate')(e.target.value)} min={todayStr()}/>
          </FL>
        )}
      </div>

      {rolls>0 ? (
        <div className="bg-blue-50 dark:bg-blue-950 border border-blue-200 dark:border-blue-800 rounded-xl p-5 space-y-4">
          <h2 className="font-bold text-blue-800 dark:text-blue-300 text-lg">Результат</h2>
          <div className="grid grid-cols-2 gap-3">
            {[
              {l:'Прокатів всього',     v:rolls},
              {l:'Годин на друк',       v:`${totalHours%1===0?totalHours:totalHours.toFixed(1)} год`},
              ...(c.isNewDesign ? [{l:'+ Підготовка трафаретів',v:'1 день (8 год)'}] : []),
              {l:'Всього робочих днів', v:days},
              {l:'Дата початку',        v:fmtD(startDate)},
              {l:'Дата готовності',     v:endDate?fmtD(endDate):'—', hi:true},
            ].map(({l,v,hi})=>(
              <div key={l} className={`rounded-lg p-3 ${hi?'bg-blue-100 dark:bg-blue-900':'bg-white dark:bg-gray-800'}`}>
                <p className="text-xs text-gray-500 dark:text-gray-400">{l}</p>
                <p className={`text-lg font-bold mt-0.5 ${hi?'text-blue-700 dark:text-blue-300':''}`}>{v}</p>
              </div>
            ))}
          </div>
          {latestEnd && <p className="text-xs text-blue-500 dark:text-blue-400">⚠️ Черга зайнята до {fmtD(latestEnd)}, початок відкладено відповідно.</p>}
          <div className="border-t border-blue-200 dark:border-blue-800 pt-3 text-xs text-blue-600 dark:text-blue-400 space-y-0.5">
            {mode==='volume'
              ? <p>Формула: {c.items} вир. × {c.rollsPerItem} прок./виріб = {rolls} прок. ÷ {PRINT_SIZES[c.printSize||'a4']?.cap??CAP}/день → {totalHours.toFixed(1)} год ÷ {HOURS_PER_DAY} год/день = {days} дн.</p>
              : <div className="space-y-0.5">
                  {c.positions.map((p,i)=>{
                    const cap=PRINT_SIZES[p.printSize||'a4']?.cap??CAP;
                    const r=(parseInt(c.items)||0)*(parseInt(p.colors)||0);
                    const h=r>0?r*HOURS_PER_DAY/cap:0;
                    return <p key={i}>{POSITIONS[p.position]||p.position}: {c.items} × {p.colors||0} кол. = {r} прок. → {h%1===0?h:h.toFixed(1)} год</p>;
                  })}
                  <p className="font-semibold">Разом: {totalHours%1===0?totalHours:totalHours.toFixed(1)} год ÷ {HOURS_PER_DAY} год/день = {printDays} дн.{c.isNewDesign?' + 1 дн. розробка':''} = {days} дн.</p>
                </div>
            }
            <p>Вихідні (сб/нд) не враховуються</p>
          </div>
        </div>
      ) : (
        <div className="text-center text-gray-400 py-10">
          {mode==='volume' ? 'Введіть кількість виробів та прокатів на виріб' : 'Введіть кількість виробів та кольорів'}
        </div>
      )}

      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
        <h3 className="font-semibold mb-3 text-sm">Таблиця потужності</h3>
        <table className="text-xs w-full">
          <thead><tr className="text-gray-500 border-b border-gray-200 dark:border-gray-700">
            <th className="text-left py-1">Розмір</th><th className="text-left py-1">Прок./день</th><th className="text-left py-1">Приклад за день</th>
          </tr></thead>
          <tbody className="divide-y divide-gray-100 dark:divide-gray-700">
            {Object.entries(PRINT_SIZES).map(([k,s])=>{
              const used = mode==='standard' && c.positions.some(p=>(p.printSize||'a4')===k);
              return (
                <tr key={k} className={used?'bg-blue-50 dark:bg-blue-950/40':''}>
                  <td className="py-1.5 font-medium">{s.label}</td>
                  <td className="py-1.5 text-blue-600 dark:text-blue-400 font-semibold">{s.cap}</td>
                  <td className="py-1.5 text-gray-400">{s.note}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

          <div>Прокати = Вироби × Кольори</div>

          <div>Тижнева потужність = 375 × 5 = 1 875 прокатів</div>
        </div>
      </div>
    </div>
  );
}

function TabChecklist() {
  const [ck,setCk] = useState({});
  const toggle = k => setCk(p=>({...p,[k]:!p[k]}));

  function CList({title,items,prefix}) {
    const done = items.filter((_,i)=>ck[`${prefix}-${i}`]).length;
    const pct  = items.length ? Math.round(done/items.length*100) : 0;
    return (
      <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 mb-4">
        <div className="flex justify-between items-center mb-1">
          <h2 className="font-bold text-lg text-blue-700 dark:text-blue-400">{title}</h2>
          <span className="text-sm text-gray-500">{done}/{items.length}</span>
        </div>
        <div className="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full mb-4 overflow-hidden">
          <div className={`h-full rounded-full transition-all ${pct===100?'bg-green-400':'bg-blue-400'}`} style={{width:`${pct}%`}}/>
        </div>
        <ul className="space-y-2">
          {items.map((item,i)=>{
            const k=`${prefix}-${i}`;
            return (
              <li key={i}>
                <label className="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" checked={!!ck[k]} onChange={()=>toggle(k)} className="mt-0.5 w-4 h-4 shrink-0 accent-blue-600"/>
                  <span className={`text-sm ${ck[k]?'line-through text-gray-400':'text-gray-700 dark:text-gray-300'}`}>{item}</span>
                </label>
              </li>
            );
          })}
        </ul>
        {pct===100&&items.length>0&&<p className="mt-3 text-center text-sm text-green-600 dark:text-green-400 font-medium">✅ Всі пункти виконано!</p>}
      </div>
    );
  }

  return (
    <div>
      <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Інтерактивні чеклісти для поточної роботи. Стан скидається при перезавантаженні.</p>
      <CList title="📋 Прийом замовлення" prefix="ord" items={[
        'Отримано дизайн-файл від клієнта',
        'Перевірено формат і роздільність файлу',
        'Уточнено та затверджено кількість кольорів',
        'Узгоджено Pantone або надано фізичний зразок кольору',
        'Підтверджено кількість виробів і розкладку по розмірах',
        'Підтверджено тип, колір та склад тканини виробу',
        'Уточнено позицію і розмір друку (в сантиметрах)',
        'Підтверджено тип фарби (пластизоль / водна / спеціальна)',
        'Узгоджено терміни і вартість',
        'Клієнт затвердив мокап (підпис або email)',
        'Замовлення внесено в систему, дата підтверджена',
      ]}/>
      <CList title="🔍 Контроль якості" prefix="qc" items={[
        'Натяг трафарету перевірено (18–25 N/cm)',
        'Емульсія нанесена рівномірно, без пропусків і підтікань',
        'Тестовий відбиток відповідає мокапу',
        'Реєстрація кольорів точна (суміщення в межах 0.5 мм)',
        'Колір відповідає еталону / Pantone',
        'Чіткість країв і дрібних деталей задовільна',
        'Укривистість фарби достатня, підкладка не просвічує',
        'Відсутність розмазування, підтікань, ореолів',
        'Температура сушки правильна (120–160°C для пластизолю)',
        'Тест на адгезію виконано (стрічка або прання)',
        'Вибіркова перевірка кожні 30–50 виробів у тиражі',
        'Фінальний ВТК перед пакуванням',
        'Вироби відсортовані по розмірах, упаковані',
      ]}/>
    </div>
  );
}
